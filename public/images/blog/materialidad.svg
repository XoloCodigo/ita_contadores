      <stop offset="0%" style="stop-color:#493A9A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4CAF7A;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)"/>
  <!-- Shield icon -->
