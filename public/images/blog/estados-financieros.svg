<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF7A;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#352B73;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)"/>
  <!-- Dashboard card -->
  <rect x="220" y="70" width="360" height="260" rx="16" fill="white" opacity="0.9"/>
  <!-- Chart area -->
  <polyline points="260,250 320,200 370,230 420,170 470,190 530,140" fill="none" stroke="#4CAF7A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="260,250 320,200 370,230 420,170 470,190 530,140 530,280 260,280" fill="#4CAF7A" opacity="0.1"/>
  <!-- Grid lines -->
  <line x1="260" y1="140" x2="530" y2="140" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="260" y1="180" x2="530" y2="180" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="260" y1="220" x2="530" y2="220" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="260" y1="260" x2="530" y2="260" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Mini stat cards -->
  <rect x="260" y="90" width="80" height="35" rx="8" fill="#352B73" opacity="0.1"/>
  <rect x="260" y="97" width="50" height="6" rx="3" fill="#352B73" opacity="0.3"/>
  <rect x="260" y="109" width="35" height="8" rx="3" fill="#4CAF7A" opacity="0.5"/>
  <rect x="355" y="90" width="80" height="35" rx="8" fill="#352B73" opacity="0.1"/>
  <rect x="355" y="97" width="50" height="6" rx="3" fill="#352B73" opacity="0.3"/>
  <rect x="355" y="109" width="35" height="8" rx="3" fill="#352B73" opacity="0.3"/>
  <rect x="450" y="90" width="80" height="35" rx="8" fill="#352B73" opacity="0.1"/>
  <rect x="450" y="97" width="50" height="6" rx="3" fill="#352B73" opacity="0.3"/>
  <rect x="450" y="109" width="35" height="8" rx="3" fill="#F59E0B" opacity="0.5"/>
  <!-- Trend arrow -->
  <circle cx="530" cy="140" r="6" fill="#4CAF7A"/>
  <!-- Decorative -->
  <circle cx="150" cy="300" r="70" fill="white" opacity="0.04"/>
  <circle cx="680" cy="130" r="50" fill="white" opacity="0.05"/>
</svg>
