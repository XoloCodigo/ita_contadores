<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#352B73;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#493A9A;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg1)"/>
  <!-- Document icon -->
  <rect x="300" y="80" width="200" height="240" rx="12" fill="white" opacity="0.15"/>
  <rect x="320" y="80" width="200" height="240" rx="12" fill="white" opacity="0.25"/>
  <rect x="340" y="80" width="200" height="240" rx="12" fill="white" opacity="0.9"/>
  <!-- Lines on document -->
  <rect x="370" y="130" width="140" height="8" rx="4" fill="#352B73" opacity="0.2"/>
  <rect x="370" y="155" width="100" height="8" rx="4" fill="#352B73" opacity="0.15"/>
  <rect x="370" y="180" width="120" height="8" rx="4" fill="#352B73" opacity="0.15"/>
  <!-- Checkmark circle -->
  <circle cx="420" cy="250" r="30" fill="#4CAF7A" opacity="0.9"/>
  <polyline points="405,250 415,260 435,240" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Warning icon -->
  <circle cx="260" cy="300" r="24" fill="#F59E0B" opacity="0.8"/>
  <line x1="260" y1="288" x2="260" y2="302" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <circle cx="260" cy="310" r="2" fill="white"/>
  <!-- Small decorative elements -->
  <circle cx="620" cy="120" r="40" fill="white" opacity="0.06"/>
  <circle cx="180" cy="160" r="60" fill="white" opacity="0.04"/>
</svg>
